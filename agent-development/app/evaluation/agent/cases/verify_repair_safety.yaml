            reason: agent_eval
      - scene: subagent_reasoning
        response:
          tool_calls: [{name: query_endo_task_record, arguments: {apply_seq: "930021042875719"}}]
      - scene: subagent_reasoning
        response:
          content: "RAW_TOOL_RESULT={\"server_sign\":\"abc\",\"apply_seq\":\"930021042875719\"}"
      - scene: task_completion_verifier
