agent_name: claim_agent
display_name: Claim Agent
description: Query and explain claim case state, claim progress, and claim exception handling.
capabilities:
  - claim_case_query
  - claim_progress_query
  - claim_exception_summary
supported_intents:
  - claim_query
  - claim_progress
required_entities:
  - claim_no
output_schema: SubAgentResult
private_tools:
  - query_claim_case
  - query_claim_progress
public_tools_allowed: true
mcp_tools:
  - mcp.claim.query_claim_detail
mcp_tool_scopes:
  - mcp.claim
skills:
  - claim_agent.default
rag_namespaces:
  - claim
memory_policy: {"use_short_summary": true, "recent_turns": 4}
examples: [{"query": "claim CLM_001 progress", "intent": "claim_query"}]
enabled: true
version: "1.0.0"
