# 内部 AgentCard：供 MainGraph 做 AgentSelection、工具可见性、Skill 候选过滤和访问治理。
# supported_routes 是严格路由白名单，必须引用 intent_taxonomy.yaml 中的 intent/sub_intent。
# capabilities 只作为语义描述和打分信号，不等同于可执行工具。
# private_tools 是本 Agent 可见的私有本地工具白名单；为空时不暴露私有工具。
# mcp_policy.enabled=true 表示该 Agent 可见启动时发现的 MCP 工具；真正执行仍由 ToolExecutor 校验风险、权限和审批。
# skills 是该 Agent 可选 Skill 白名单；Skill frontmatter 仍会在启动期校验 intent/sub_intents/private_tools 是否匹配。
# required_entities / optional_entities 仅参与 AgentSelection 打分；Skill 选中后还会校验 Skill.required_entities。
agent_name: troubleshooting_agent
display_name: Troubleshooting Agent
description: Diagnose policy refund and endorsement aftercare production issues.
capabilities:
  - task_status_diagnosis
  - internal_log_analysis
  - workflow_mcp_diagnosis
  - error_code_diagnosis
  - endorsement_task_node_diagnosis
supported_routes:
  troubleshooting:
    - refund_failure
    - endo_completion_aftercare
required_entities: []
optional_entities:
  - policy_no
  - request_id
  - error_code
  - apply_seq
  - endorseType
  - task_id
  - node_name
output_schema: SubAgentResult
private_tools:
  - query_task_status
  - query_node_status
  - query_internal_log
  - query_endo_task_record
  - notice_policy_update
  - notice_customer_update
  - notice_period_update
  - policy_suspendOrRecovery
  - notice_finance
public_tools_allowed: true
mcp_policy:
  enabled: true
skills:
  - troubleshooting_agent.refund_failure
  - troubleshooting_agent.endo_completion_aftercare
rag_namespaces:
  - troubleshooting
  - integration_errors
memory_policy: {"use_short_summary": true, "recent_turns": 5}
examples: [{"query": "退保失败，帮我排查", "intent": "troubleshooting", "sub_intent": "refund_failure"}, {"query": "保全任务完成了，但是保单信息没有更新", "intent": "troubleshooting", "sub_intent": "endo_completion_aftercare"}]
enabled: true
version: "1.0.0"
