agent_name: document_parse_agent
display_name: Document Parse Agent
description: Parse markdown, JSON, YAML, or plain text interface documents into structured fields.
capabilities:
  - document_parse
  - field_extract
  - error_code_extract
supported_intents:
  - document_parse
required_entities: []
optional_entities:
  - document_type
  - api_name
  - field_name
  - table_name
output_schema: SubAgentResult
private_tools: []
public_tools_allowed: true
skills:
  - document_parse_agent.api_doc_parse
  - document_parse_agent.error_code_extract
  - document_parse_agent.markdown_parse
rag_namespaces:
  - documents
memory_policy: {"use_short_summary": true, "recent_turns": 3}
examples: [{"query": "parse this markdown interface document", "intent": "document_parse"}]
enabled: true
version: "1.0.0"
