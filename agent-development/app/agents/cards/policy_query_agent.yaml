agent_name: policy_query_agent
display_name: Policy Query Agent
description: Query policy information, policy status, and policy lifecycle facts.
capabilities:
  - policy_info_query
  - policy_status_query
  - policy_lifecycle_explanation
supported_intents:
  - policy_query
  - policy_status
  - product_rule_qa
required_entities: []
optional_entities:
  - policy_no
  - product_code
  - insured_name
output_schema: SubAgentResult
private_tools:
  - query_policy_info
  - query_policy_status
  - update_policy_status
public_tools_allowed: true
mcp_tools:
  - mcp.policy.query_policy_detail
mcp_tool_scopes:
  - mcp.policy
skills:
  - policy_query_agent.default
rag_namespaces:
  - policy
  - product_rules
memory_policy: {"use_short_summary": true, "recent_turns": 4}
examples: [{"query": "policy P2021344266 status", "intent": "policy_query"}]
enabled: true
version: "1.0.0"
