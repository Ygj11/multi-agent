version: "1.0.0"

patterns:
  - entity_type: request_id
    description: 请求流水号，以 req 开头，例如 REQ_001、req-20240501-0001
    regex:
      - "(?<![A-Za-z0-9])REQ(?:[_-]?[0-9][A-Za-z0-9_-]*|[_-][A-Za-z0-9_-]+)(?![A-Za-z0-9])"
      - "(?:请求流水号|请求号|request[_-]?id|requestId)[:：=]?\\s*(REQ(?:[_-]?[0-9][A-Za-z0-9_-]*|[_-][A-Za-z0-9_-]+))(?![A-Za-z0-9])"
    normalized_type: string
    sensitive: false
    confidence: 0.95

  - entity_type: error_code
    description: 错误码，例如 E102、ERR_500、ERROR-1001
    regex:
      - "\\bE\\d{3,6}\\b"
      - "\\bERR[_-]?\\d{3,6}\\b"
      - "\\bERROR[_-]?\\d{3,6}\\b"
    normalized_type: string
    sensitive: false
    confidence: 0.9

  - entity_type: apply_seq
    description: 保全受理号 / 申请流水号，930 开头的 15 位数字
    regex:
      - "(?:受理号|申请号|apply[_-]?seq|applySeq)[:：=]?\\s*(930\\d{12})(?!\\d)"
      - "(?<!\\d)930\\d{12}(?!\\d)"
    normalized_type: string
    sensitive: false
    confidence: 0.95

  - entity_type: policy_no
    description: 保单号，920 开头的 16 位数字
    regex:
      - "(?:保单号|保单|policy[_-]?no|policyNo)[:：=]?\\s*(920\\d{13})(?!\\d)"
      - "(?<!\\d)920\\d{13}(?!\\d)"
    normalized_type: string
    sensitive: false
    confidence: 0.95

  - entity_type: endorseType
    description: 保全项 / 保全类型，00 开头的 6 位数字
    regex:
      - "(?:保全项|保全类型|endorseType)[:：=]?\\s*(00\\d{4})(?!\\d)"
      - "(?<!\\d)00\\d{4}(?!\\d)"
    normalized_type: string
    sensitive: false
    confidence: 0.9

  - entity_type: customer_no
    description: 客户号，例如 customerNo、customer_no
    regex:
      - "(?:客户号|customer[_-]?no|customerNo)[:：=]?\\s*([A-Za-z0-9_-]+)"
    normalized_type: string
    sensitive: false
    confidence: 0.9

  - entity_type: payMode
    description: 支付方式，例如 payMode=Y
    regex:
      - "(?:支付方式|payMode)[:：=]?\\s*([A-Za-z0-9_-]+)"
    normalized_type: string
    sensitive: false
    confidence: 0.85

  - entity_type: operatorId
    description: 操作人，例如 operatorId
    regex:
      - "(?:操作人|operatorId|operator_id)[:：=]?\\s*([A-Za-z0-9_-]+)"
    normalized_type: string
    sensitive: false
    confidence: 0.85

  - entity_type: applyDate
    description: 受理日期毫秒时间戳
    regex:
      - "(?:受理日期|applyDate)[:：=]?\\s*(\\d{10,13})"
    normalized_type: string
    sensitive: false
    confidence: 0.8

  - entity_type: surDate
    description: 退保日期毫秒时间戳
    regex:
      - "(?:退保日期|surDate)[:：=]?\\s*(\\d{10,13})"
    normalized_type: string
    sensitive: false
    confidence: 0.8

  - entity_type: acceptDate
    description: 提交校验受理日期毫秒时间戳
    regex:
      - "(?:受理日期|acceptDate)[:：=]?\\s*(\\d{10,13})"
    normalized_type: string
    sensitive: false
    confidence: 0.8

  - entity_type: claim_no
    description: 理赔号
    regex:
      - "\\bCLM[_-]?[A-Za-z0-9_-]+\\b"
      - "\\bCLAIM[_-]?[A-Za-z0-9_-]+\\b"
    normalized_type: string
    sensitive: false
    confidence: 0.9

  - entity_type: product_code
    description: 产品编码，以 pm 开头
    regex:
      - "(?:产品编码|产品代码|product[_-]?code|productCode)[:：=]?\\s*(PM[A-Za-z0-9_-]{1,30})(?![A-Za-z0-9])"
      - "(?<![A-Za-z0-9])PM[A-Za-z0-9_-]{1,30}(?![A-Za-z0-9])"
    normalized_type: string
    sensitive: false
    confidence: 0.85

  - entity_type: plan_code
    description: 险种编码，以 h 开头
    regex:
      - "(?:险种编码|险种代码|plan[_-]?code|planCode)[:：=]?\\s*(H[A-Za-z0-9_-]{1,30})(?![A-Za-z0-9])"
      - "(?<![A-Za-z0-9])H[A-Za-z0-9_-]{1,30}(?![A-Za-z0-9])"
    normalized_type: string
    sensitive: false
    confidence: 0.85

  - entity_type: phone_number
    description: 中国大陆手机号
    regex:
      - "(?<!\\d)1[3-9]\\d{9}(?!\\d)"
    normalized_type: string
    sensitive: true
    confidence: 0.95

  - entity_type: id_card
    description: 中国大陆居民身份证号
    regex:
      - "(?<![A-Za-z0-9])[1-9]\\d{5}(?:18|19|20)\\d{2}(?:0[1-9]|1[0-2])(?:0[1-9]|[12]\\d|3[01])\\d{3}[0-9Xx](?![A-Za-z0-9])"
    normalized_type: string
    sensitive: true
    confidence: 0.95
