version: "1.0.0"

patterns:
  - entity_type: request_id
    description: 请求流水号，例如 REQ_001、REQ-20240501-0001
    regex:
      - "\\bREQ(?:[_-]?[0-9][A-Za-z0-9_-]*|[_-][A-Za-z0-9_-]+)\\b"
    normalized_type: string
    sensitive: false
    confidence: 0.95

  - entity_type: error_code
    description: 错误码，例如 E102、ERR_500、ERROR-1001
    regex:
      - "\\bE\\d{3,6}\\b"
      - "\\bERR[_-]?\\d{3,6}\\b"
      - "\\bERROR[_-]?\\d{3,6}\\b"
    normalized_type: string
    sensitive: false
    confidence: 0.9

  - entity_type: apply_seq
    description: 保全受理号 / 申请流水号，例如 APPLY_POLICY_UPDATE_FAIL
    regex:
      - "\\bAPPLY[_-]?[A-Za-z0-9_-]+\\b"
      - "(?:受理号|申请号|apply[_-]?seq|applySeq)[:：=]?\\s*([A-Za-z0-9_-]+)"
    normalized_type: string
    sensitive: false
    confidence: 0.95

  - entity_type: policy_no
    description: 保单号
    regex:
      - "(?:保单号|policy[_-]?no|policyNo)[:：=]?\\s*([A-Za-z0-9]{3,20})(?![A-Za-z0-9])"
      - "(?<![A-Za-z0-9])P\\d{3,}(?![A-Za-z0-9])"
      - "(?<![A-Za-z0-9])\\d{10,20}(?![A-Za-z0-9])"
    normalized_type: string
    sensitive: false
    confidence: 0.85

  - entity_type: endorseType
    description: 保全项 / 保全类型，例如 退保、地址变更、客户资料变更
    regex:
      - "(?:保全项|保全类型|endorseType)[:：=]?\\s*([\\u4e00-\\u9fa5A-Za-z0-9_-]+)"
    normalized_type: string
    sensitive: false
    confidence: 0.85

  - entity_type: customer_no
    description: 客户号，例如 customerNo、customer_no
    regex:
      - "(?:客户号|customer[_-]?no|customerNo)[:：=]?\\s*([A-Za-z0-9_-]+)"
    normalized_type: string
    sensitive: false
    confidence: 0.9

  - entity_type: payMode
    description: 支付方式，例如 payMode=Y
    regex:
      - "(?:支付方式|payMode)[:：=]?\\s*([A-Za-z0-9_-]+)"
    normalized_type: string
    sensitive: false
    confidence: 0.85

  - entity_type: operatorId
    description: 操作人，例如 operatorId
    regex:
      - "(?:操作人|operatorId|operator_id)[:：=]?\\s*([A-Za-z0-9_-]+)"
    normalized_type: string
    sensitive: false
    confidence: 0.85

  - entity_type: applyDate
    description: 受理日期毫秒时间戳
    regex:
      - "(?:受理日期|applyDate)[:：=]?\\s*(\\d{10,13})"
    normalized_type: string
    sensitive: false
    confidence: 0.8

  - entity_type: surDate
    description: 退保日期毫秒时间戳
    regex:
      - "(?:退保日期|surDate)[:：=]?\\s*(\\d{10,13})"
    normalized_type: string
    sensitive: false
    confidence: 0.8

  - entity_type: acceptDate
    description: 提交校验受理日期毫秒时间戳
    regex:
      - "(?:受理日期|acceptDate)[:：=]?\\s*(\\d{10,13})"
    normalized_type: string
    sensitive: false
    confidence: 0.8

  - entity_type: claim_no
    description: 理赔号
    regex:
      - "\\bCLM[_-]?[A-Za-z0-9_-]+\\b"
      - "\\bCLAIM[_-]?[A-Za-z0-9_-]+\\b"
    normalized_type: string
    sensitive: false
    confidence: 0.9

  - entity_type: interface_name
    description: 接口名，例如 submitProposal、callbackNotify
    regex:
      - "\\b[a-z][A-Za-z0-9_]*(?:Api|API|Service|Callback|Notify|Proposal|Policy|Claim)?\\b"
    keyword_allowlist:
      - submitProposal
      - callbackNotify
      - refundCallback
      - policyQuery
      - claimQuery
    normalized_type: string
    sensitive: false
    confidence: 0.75

  - entity_type: product_code
    description: 产品编码
    regex:
      - "\\bPROD[_-]?[A-Za-z0-9_-]+\\b"
    normalized_type: string
    sensitive: false
    confidence: 0.85

  - entity_type: phone_number
    description: 手机号
    regex:
      - "(?<!\\d)1[3-9]\\d{9}(?!\\d)"
    normalized_type: string
    sensitive: true
    confidence: 0.95

  - entity_type: id_card
    description: 身份证号
    regex:
      - "(?<!\\d)\\d{17}[0-9Xx](?!\\d)"
    normalized_type: string
    sensitive: true
    confidence: 0.95
