# 字段可见性策略是校验依赖的策略配置，不是独立 verifier。
# 调用关系：
#
# field_visibility_policy.yaml
#         ↓
# FieldVisibilityPolicy
#         ↓
# DataPermissionVerifier
#         ↓
# VerificationService(pre_answer)
#
# 例子：
# phone_number:
#   action: redact
#   pattern: "(?<!\\d)1[3-9]\\d{9}(?!\\d)"
#   mask: "***PHONE***"
#   allow_permissions:
#     - pii.phone.read
#
# 含义：
# 如果最终答案里有手机号，并且 principal 没有 pii.phone.read / pii.full.read / policy.sensitive.read，
#    【如 principal.py 的 scopes和data_permissions 包含 即可】
#    【属性值来源：HTTP Header 里解析，如X-User-Scopes: agent:use,policy:read，X-Data-Permissions: pii.phone.read,pii.full.read】
# 则 DataPermissionVerifier 会把手机号替换成 ***PHONE***。
privileged_roles:
  - compliance_auditor
  - data_admin

categories:
  phone_number:
    action: redact
    pattern: "(?<!\\d)1[3-9]\\d{9}(?!\\d)"
    mask: "***PHONE***"
    allow_permissions:
      - policy.sensitive.read
      - pii.full.read
      - pii.phone.read

  id_card:
    action: redact
    pattern: "(?<!\\d)\\d{17}[\\dXx](?!\\d)"
    mask: "***ID_CARD***"
    allow_permissions:
      - policy.sensitive.read
      - pii.full.read
      - pii.id_card.read

  bank_card:
    action: redact
    pattern: "(?<!\\d)\\d{16,19}(?!\\d)"
    mask: "***BANK_CARD***"
    preserve_if_category_allowed: id_card
    allow_permissions:
      - policy.sensitive.read
      - pii.full.read
      - pii.bank_card.read
      - payment.sensitive.read

  health_privacy:
    action: warn
    keywords:
      - 病史
      - 医疗记录
      - 诊断
      - 医保
      - 健康告知
    allow_permissions:
      - policy.sensitive.read
      - health.sensitive.read
